name: maven java docker build deploy
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
         maven-version: 3.8.9
      - name: Build with Maven
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: mvn clean package -s .mvn/settings.xml -Drevision=${{ inputs.version }}
      - name: upload jar file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app-jar  
          path: target/*.jar
